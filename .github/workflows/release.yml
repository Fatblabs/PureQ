name: PureQ Auto Build & Release

on:
  push:
    tags:
      - 'v*' # Triggers automatically when you push a version tag (e.g., v1.0.0, v2.1.0)

permissions:
  contents: write # Grants the workflow permission to create a Release and upload files

jobs:
  build-and-release:
    name: Build macOS Installer & Publish
    runs-on: macos-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Build Installer Package
        run: |
          chmod +x Scripts/package-pureq.sh Scripts/install-pureq.sh Scripts/uninstall-pureq.sh
          Scripts/package-pureq.sh
        env:
          CONFIGURATION: Release
          # Public CI builds are unsigned unless you provide Apple signing and
          # notarization credentials. The .pkg still installs both the app and
          # the HAL driver, avoiding the source-build echo path.
          CODE_SIGNING_ALLOWED: NO
          CODE_SIGNING_REQUIRED: NO
          CODE_SIGN_IDENTITY: ""

      - name: Verify Installer Package
        run: |
          pkgutil --check-signature dist/*.pkg || true
          shasum -a 256 dist/*.pkg > dist/checksums.txt
          cat dist/checksums.txt

      - name: Create GitHub Release and Upload Installer
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.pkg
            dist/checksums.txt
          generate_release_notes: true # Automatically populates release notes with your commit history
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Built-in token provided automatically by GitHub
